<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Brain</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%236c7fff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z'/><path d='M9 13a4.5 4.5 0 0 0 3-4'/><path d='M6.003 5.125A3 3 0 0 0 6.401 6.5'/><path d='M3.477 10.896a4 4 0 0 1 .585-.396'/><path d='M6 18a4 4 0 0 1-1.967-.516'/><path d='M12 13h4'/><path d='M12 18h6a2 2 0 0 1 2 2v1'/><path d='M12 8h8'/><path d='M16 8V5a2 2 0 0 1 2-2'/><circle cx='16' cy='13' r='.5'/><circle cx='18' cy='3' r='.5'/><circle cx='20' cy='21' r='.5'/><circle cx='20' cy='8' r='.5'/></svg>"
    />
    <link rel="stylesheet" href="/style.css" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Brain" />
    <link rel="apple-touch-icon" href="/icon.svg" />
  </head>
  <body>
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- New category modal -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-title">New category proposed</div>
        <div class="modal-body" id="modal-body"></div>
        <input
          type="text"
          class="modal-input"
          id="modal-cat-label"
          placeholder="Category label (e.g. Cognitive Science)"
        />
        <div class="modal-actions">
          <button class="btn-modal-cancel" onclick="closeModal()">
            Cancel
          </button>
          <button class="btn-modal-confirm" onclick="confirmNewCategory()">
            Add category & approve
          </button>
        </div>
      </div>
    </div>

    <!-- Unsaved changes modal -->
    <div class="modal-overlay" id="unsaved-modal">
      <div class="modal">
        <div class="modal-title">Unsaved changes</div>
        <div class="modal-body">
          You have unsaved changes. Do you want to save before leaving?
        </div>
        <div class="modal-actions">
          <button class="btn-modal-cancel" onclick="discardAndLeave()">
            Discard
          </button>
          <button class="btn-modal-confirm" onclick="saveAndLeave()">
            Save & leave
          </button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <button
      class="scroll-top-btn"
      id="scroll-top-btn"
      onclick="scrollToTop()"
      title="Back to top"
    >
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
      >
        <path d="M18 15l-6-6-6 6" />
      </svg>
    </button>

    <div class="app">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="logo" onclick="resetHome()">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="26"
              height="26"
              viewBox="0 0 24 24"
              fill="none"
              stroke="var(--accent)"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"
              />
              <path d="M9 13a4.5 4.5 0 0 0 3-4" />
              <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5" />
              <path d="M3.477 10.896a4 4 0 0 1 .585-.396" />
              <path d="M6 18a4 4 0 0 1-1.967-.516" />
              <path d="M12 13h4" />
              <path d="M12 18h6a2 2 0 0 1 2 2v1" />
              <path d="M12 8h8" />
              <path d="M16 8V5a2 2 0 0 1 2-2" />
              <circle cx="16" cy="13" r=".5" />
              <circle cx="18" cy="3" r=".5" />
              <circle cx="20" cy="21" r=".5" />
              <circle cx="20" cy="8" r=".5" />
            </svg>
            The Brain
          </div>
        </div>
        <div class="search-wrap">
          <input
            type="search"
            class="search-input"
            id="search-input"
            placeholder="Search everything..."
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <nav class="nav-section" id="sidebar-nav">
          <div id="cat-nav"></div>
        </nav>
        <div class="draft-section">
          <div class="draft-label">New document</div>
          <input
            type="text"
            class="draft-input"
            id="draft-topic"
            placeholder="Topic..."
            autocomplete="off"
          />
          <div class="draft-row">
            <input
              type="text"
              class="draft-input"
              id="draft-url"
              placeholder="URL (optional)"
              autocomplete="off"
            />
            <select class="draft-select" id="draft-lang">
              <option value="en">EN</option>
              <option value="it">IT</option>
            </select>
          </div>
          <input
            type="text"
            class="draft-input"
            id="draft-url-title"
            placeholder="URL title (optional)"
            autocomplete="off"
          />
          <button class="draft-btn" id="draft-btn" onclick="submitDraft()">
            <span class="draft-spinner"></span>
            <span class="draft-btn-label">Generate draft</span>
          </button>
        </div>
      </aside>

      <div class="main">
        <div class="mobile-topbar">
          <div class="mobile-logo" onclick="resetHome()">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="var(--accent)"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"
              />
              <path d="M9 13a4.5 4.5 0 0 0 3-4" />
              <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5" />
              <path d="M3.477 10.896a4 4 0 0 1 .585-.396" />
              <path d="M6 18a4 4 0 0 1-1.967-.516" />
              <path d="M12 13h4" />
              <path d="M12 18h6a2 2 0 0 1 2 2v1" />
              <path d="M12 8h8" />
              <path d="M16 8V5a2 2 0 0 1 2-2" />
              <circle cx="16" cy="13" r=".5" />
              <circle cx="18" cy="3" r=".5" />
              <circle cx="20" cy="21" r=".5" />
              <circle cx="20" cy="8" r=".5" />
            </svg>
            The Brain
          </div>
          <div class="mobile-context" id="mobile-context"></div>
          <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menu">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
        </div>
        <div class="content" id="content">
          <div class="loading">
            <span class="loading-dot"></span><span class="loading-dot"></span
            ><span class="loading-dot"></span>
          </div>
        </div>
      </div>
    </div>
    <script src="/app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js");
      }
    </script>
  </body>
</html>
